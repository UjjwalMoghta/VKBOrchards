<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="loginstyle.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VKBOrchards</title>
    <link rel="icon" type="image/png" href="img/app.png.webp">
</head>
<body>
    <header>
        <a href="index.html"><img src="img/VKB.png" class="logo" alt="logo"></a>
        <h1>Welcome Back to VKB Orchards</h1>
        <p>Access your account and stay connected with nature’s freshness.</p>
        <hr>
    </header>
    <main>
        <form>
            <div>
                <label for="name"></label>
                <input id="name" type="text" placeholder="Enter Name">
            </div>
            <div>
                <label for="Password"></label>
                <input type="password" id="Password" placeholder="Enter Password">
            </div>
            <button class="login-btn" type="submit">Login</button>

        </form>
        <hr>
        <div class="signup">
            <h2>New to VKB Orchards ?</h2>
            <a href="signup.html" class="signup">Sign Up</a>
        
        </div>
    </main>
    <footer>
        <p>&copy;VKB Orchards — where freshness begins.</p>
    </footer>
</body>
</html>
