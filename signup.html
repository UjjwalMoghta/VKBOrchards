<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="signupstyle.css" <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - VKB Orchards</title>
    <link rel="icon" type="image/png" href="img/app.png.webp">
</head>

<body>
    <header>
        <a href="index.html"><img src="img/VKB.png" alt="logo" class="logo"></a>
        <h1>Join VKB Orchads</h1>
        <p>Join us and enjoy nature’s freshest harvest.</p>
        <hr>
    </header>
    <main>
        <h1>Create Your Account</h1>
        <form>
            <div>
                <label for="name"></label>
                <input id="name" type="text" placeholder="Enter Your Name">
            </div>
            <div>
                <label for="Phone"></label>
                <input id="Phone" type="phone" placeholder="Enter Number">
            </div>
            <div>
                <label for="Email"></label>
                <input id="Email" type="email" placeholder="Enter Email">
            </div>
            <div>
                <label for="Password"></label>
                <input id="Password" type="password" placeholder="Enter Password">
            </div>
            <div>
                <label for="Confirm Password"></label>
                <input id="Confirm Password" type="password" placeholder="Confirm Password">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" required id="terms">
                <label for="terms">
                    I Agree to the Terms & Conditions and Privacy Policy
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" required>
                    Privacy Policy
                </label>
            </div>
            <button class="signup-btn" type="submit">Sign Up</button>

        </form>
        <hr>
        <div class="login-section">
            <h2>Already Have An Account?</h2>
            <a href="login.html" class="login-btn">Login</a>
        </div>


    </main>
    <footer>
        <p>&copy;VKB Orchards — where freshness begins.</p>
    </footer>

</body>

</html>
